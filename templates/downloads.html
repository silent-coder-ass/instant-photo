<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store – Instant Photo</title>
  <meta name="description" content="Download apps, albums, and media files from the Instant Photo Store.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(99,102,241,0.4);
      --text: #f0f4ff;
      --muted: #8892a4;
      --accent: #6366f1;
      --accent2: #a855f7;
      --green: #22c55e;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.25rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--text);
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.3px;
    }
    .brand-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: white;
      flex-shrink: 0;
    }
    .nav-search {
      flex: 1;
      max-width: 320px;
      margin: 0 1.5rem;
      position: relative;
    }
    .nav-search input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.5rem 0.75rem 0.5rem 2.2rem;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .nav-search input:focus { border-color: var(--accent); }
    .nav-search input::placeholder { color: var(--muted); }
    .nav-search i {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.8rem;
    }
    .nav-count {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3.5rem 1.5rem 2rem;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #e0e7ff 0%, var(--accent) 50%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }
    .hero p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 400px;
      margin: 0 auto 2rem;
    }

    /* ── CATEGORY PILLS ── */
    .cats-wrap {
      position: relative;
      z-index: 1;
      padding: 0 1.25rem 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .cats {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .cats::-webkit-scrollbar { display: none; }
    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.45rem 1rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pill:hover { background: var(--surface-hover); color: var(--text); }
    .pill.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(168,85,247,0.25));
      border-color: var(--accent);
      color: #a5b4fc;
      font-weight: 600;
    }

    /* ── GRID ── */
    .grid-wrap {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.25rem 4rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s, border-color 0.25s;
      position: relative;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(99,102,241,0.35);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(99,102,241,0.1);
    }
    .card-img-wrap {
      height: 170px;
      overflow: hidden;
      background: linear-gradient(135deg, #111827, #1e1b4b);
      position: relative;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .card:hover .card-img-wrap img { transform: scale(1.06); }
    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: rgba(255,255,255,0.07);
    }
    .card-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(99,102,241,0.9);
      backdrop-filter: blur(4px);
      color: white;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .badge-album { background: rgba(168,85,247,0.9); }
    .card-body {
      padding: 1.1rem 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 0.5rem;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .card-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.3;
    }
    .card-desc {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .btn-dl {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
      text-decoration: none;
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
    }
    .btn-dl:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99,102,241,0.45);
    }
    .btn-dl-album {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      box-shadow: 0 4px 15px rgba(168,85,247,0.3);
    }
    .btn-dl-album:hover { box-shadow: 0 6px 20px rgba(168,85,247,0.45); }

    /* ── EMPTY STATE ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }
    .empty i { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; display: block; }

    /* ── SKELETON LOADER ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.06) 50%, var(--surface) 75%);
      background-size: 200%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── ALBUM MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-sheet {
      background: #10172a;
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      transform: translateY(40px);
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-drag { width: 36px; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.15); margin: 10px auto 0; }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h3 { font-weight: 700; font-size: 1rem; }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 1rem;
    }
    .modal-close:hover { background: rgba(239,68,68,0.2); color: #f87171; }
    .modal-body {
      overflow-y: auto;
      padding: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .album-file {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
    }
    .album-file:hover { border-color: rgba(99,102,241,0.4); }
    .album-file-thumb {
      height: 100px;
      overflow: hidden;
      background: #1a2035;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .album-file-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .album-file-thumb i { font-size: 2rem; color: var(--muted); opacity: 0.4; }
    .album-file-info { padding: 0.5rem; }
    .album-file-name {
      font-size: 0.7rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 0.4rem;
    }
    .album-file-dl {
      display: block;
      text-align: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 5px;
      border-radius: 7px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .album-file-dl:hover { opacity: 0.85; }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .nav-search { display: none; }
      .hero { padding: 2.5rem 1rem 1.5rem; }
      .modal-body { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="brand">
      <div class="brand-icon"><i class="fa-solid fa-store"></i></div>
      Store
    </a>
    <div class="nav-search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Search apps, albums..." oninput="onSearch(this.value)">
    </div>
    <span class="nav-count" id="itemCount"></span>
  </div>
</nav>

<section class="hero">
  <h1>Download Hub</h1>
  <p>Apps, photos, albums and more — all in one place.</p>
</section>

<div class="cats-wrap">
  <div class="cats" id="catBar"></div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid">
    <!-- skeleton placeholders -->
    ${[...Array(6)].map(() => `
      <div class="card" style="min-height:260px">
        <div class="card-img-wrap skeleton" style="height:170px"></div>
        <div class="card-body" style="gap:0.6rem">
          <div class="skeleton" style="height:12px;width:60%;border-radius:4px"></div>
          <div class="skeleton" style="height:16px;border-radius:4px"></div>
          <div class="skeleton" style="height:12px;width:80%;border-radius:4px"></div>
          <div class="skeleton" style="height:36px;border-radius:10px;margin-top:auto"></div>
        </div>
      </div>
    `).join('')}
  </div>
</div>

<!-- Album Modal -->
<div class="modal-overlay" id="albumModal" onclick="closeAlbumModal(event)">
  <div class="modal-sheet">
    <div class="modal-drag"></div>
    <div class="modal-head">
      <h3 id="albumModalTitle">Album</h3>
      <button class="modal-close" onclick="closeAlbumModal()">&times;</button>
    </div>
    <div class="modal-body" id="albumModalBody"></div>
  </div>
</div>

<script>
  let allItems = [];
  let currentCat = 'All';

  async function loadData() {
    try {
      const res = await fetch('/api/downloads_data?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error(res.status);
      allItems = await res.json();
      buildCats();
      render(allItems);
      document.getElementById('itemCount').textContent = allItems.length + ' items';
    } catch(e) {
      document.getElementById('grid').innerHTML = `<div class="empty"><i class="fa-solid fa-triangle-exclamation"></i>Failed to load. Check server.</div>`;
    }
  }

  function buildCats() {
    const cats = ['All', ...new Set(allItems.map(i => i.category || 'Other').filter(Boolean))];
    const bar = document.getElementById('catBar');
    bar.innerHTML = cats.map(c => `<button class="pill${c===currentCat?' active':''}" onclick="filterCat('${c}')">${c}</button>`).join('');
  }

  window.filterCat = function(cat) {
    currentCat = cat;
    document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.textContent === cat));
    const filtered = cat === 'All' ? allItems : allItems.filter(i => (i.category || 'Other') === cat);
    render(filtered);
  };

  function onSearch(q) {
    const filtered = allItems.filter(i => (i.title + ' ' + i.description + ' ' + i.category).toLowerCase().includes(q.toLowerCase()));
    render(filtered);
  }

  function render(items) {
    const grid = document.getElementById('grid');
    if (!items || !items.length) {
      grid.innerHTML = `<div class="empty"><i class="fa-solid fa-box-open"></i>No items found.</div>`;
      return;
    }
    grid.style.opacity = 0;
    grid.innerHTML = items.map(item => {
      const thumb = item.image
        ? `<img src="${item.image}" alt="${item.title}" loading="lazy">`
        : `<div class="card-placeholder"><i class="fa-brands fa-android"></i></div>`;

      const badge = item.is_album
        ? `<span class="card-badge badge-album"><i class="fa-solid fa-images"></i> Album</span>`
        : (item.category ? `<span class="card-badge">${item.category}</span>` : '');

      const tags = [];
      if (item.version) tags.push(`v${item.version}`);
      if (item.is_album) tags.push(`${(item.album_files||[]).length} files`);

      let dl = item.link || '';
      if (dl.includes('res.cloudinary.com') && dl.includes('/upload/') && !dl.includes('fl_attachment')) {
        dl = dl.replace('/upload/', '/upload/fl_attachment/');
      }

      const btn = item.is_album
        ? `<button class="btn-dl btn-dl-album" onclick="openAlbumModal('${item.id}')"><i class="fa-solid fa-folder-open"></i> View Album</button>`
        : `<button onclick="forceDownload(this, '${dl}', '${item.title.replace(/'/g, "\\'")}')" class="btn-dl"><i class="fa-solid fa-cloud-arrow-down"></i> Download</button>`;

      return `
        <article class="card">
          <div class="card-img-wrap">
            ${thumb}
            ${badge}
          </div>
          <div class="card-body">
            <div class="card-meta">
              ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <h2 class="card-title">${item.title}</h2>
            ${item.description ? `<p class="card-desc">${item.description}</p>` : ''}
            ${btn}
          </div>
        </article>`;
    }).join('');
    requestAnimationFrame(() => { grid.style.transition = 'opacity 0.4s'; grid.style.opacity = 1; });
  }

  window.openAlbumModal = function(id) {
    const item = allItems.find(x => x.id === id);
    if (!item) return;
    document.getElementById('albumModalTitle').textContent = item.title + ` (${(item.album_files||[]).length} files)`;
    const body = document.getElementById('albumModalBody');
    body.innerHTML = (item.album_files || []).map(f => {
      let link = f.link || '';
      if (link.includes('res.cloudinary.com') && link.includes('/upload/') && !link.includes('fl_attachment')) {
        link = link.replace('/upload/', '/upload/fl_attachment/');
      }
      const isImg = /\.(jpg|jpeg|png|gif|webp|svg)/i.test(f.name || link);
      const thumb = isImg
        ? `<img src="${f.link}" alt="${f.name}" loading="lazy">`
        : `<i class="fa-solid fa-file-pdf"></i>`;
      return `
        <div class="album-file">
          <div class="album-file-thumb">${thumb}</div>
          <div class="album-file-info">
            <div class="album-file-name">${f.name || 'File'}</div>
            <button onclick="forceDownload(this, '${link}', '${(f.name || 'File').replace(/'/g, "\\'")}')" class="album-file-dl"><i class="fa-solid fa-download"></i> Download</button>
          </div>
        </div>`;
    }).join('');
    document.getElementById('albumModal').classList.add('open');
  };

  window.closeAlbumModal = function(e) {
    if (!e || e.target === document.getElementById('albumModal')) {
      document.getElementById('albumModal').classList.remove('open');
    }
  };

  window.forceDownload = async function(btn, url, defaultName) {
    const oldHtml = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
    btn.disabled = true;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error("Network error");
      const blob = await res.blob();
      const localUrl = window.URL.createObjectURL(blob);
      let ext = url.split('.').pop().split('?')[0];
      if (ext && ext.includes('/')) ext = '';
      let filename = defaultName || 'download';
      if (ext && !filename.toLowerCase().endsWith('.' + ext.toLowerCase())) {
          filename += '.' + ext;
      }
      const a = document.createElement('a');
      a.href = localUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(localUrl);
    } catch (err) {
      window.open(url, '_blank');
    } finally {
      btn.innerHTML = oldHtml;
      btn.disabled = false;
    }
  };

  document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
